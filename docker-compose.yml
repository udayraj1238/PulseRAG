
version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pulserag
      POSTGRES_USER: pulserag
      POSTGRES_PASSWORD: pulserag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - POSTGRES_URL=postgresql+asyncpg://pulserag:pulserag@postgres:5432/pulserag
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - qdrant
      - postgres
      - redis
    volumes:
      - .:/app

  ui:
    build: .
    command: streamlit run ui/app.py --server.port 8501
    ports:
      - "8501:8501"
    depends_on:
      - api
